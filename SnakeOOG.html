<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f9fa;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
#gameWrapper{width:100%;max-width:640px;margin:0 auto;padding:10px;display:flex;flex-direction:column;align-items:center}
#topBar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 4px;margin-bottom:8px}
#scoreDisplay{font-size:18px;font-weight:bold;color:#333;display:flex;flex-direction:column}
#highScoreDisplay{font-size:12px;color:#5f6368;font-weight:normal}
#topRight{display:flex;gap:8px;align-items:center}
#botBadge{background:#4285f4;color:#fff;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:bold;display:none}
#muteBtn,#settingsBtn,#pauseBtn{background:none;border:none;cursor:pointer;font-size:22px;padding:4px;border-radius:50%;transition:background 0.2s}
#muteBtn:hover,#settingsBtn:hover,#pauseBtn:hover{background:#e8e8e8}
#canvasContainer{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.18),0 0 0 4px #5f6368}
canvas{display:block}
#overlayScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(248,249,250,0.93);z-index:10;border-radius:12px;transition:opacity 0.3s}
#overlayScreen.hidden{display:none}
.overlay-title{font-size:28px;font-weight:bold;color:#202124;margin-bottom:8px}
.overlay-sub{font-size:15px;color:#5f6368;margin-bottom:18px}
.score-big{font-size:48px;font-weight:bold;color:#1a73e8;margin-bottom:4px}
.record-text{font-size:14px;color:#5f6368;margin-bottom:6px}
.new-record{font-size:16px;font-weight:bold;color:#f9ab00;margin-bottom:12px}
.btn{background:#4285f4;color:#fff;border:none;border-radius:24px;padding:10px 32px;font-size:16px;font-weight:bold;cursor:pointer;transition:background 0.2s;margin:4px}
.btn:hover{background:#1a73e8}
.btn-green{background:#34a853}.btn-green:hover{background:#1e8e3e}
.btn-outline{background:transparent;color:#4285f4;border:2px solid #4285f4}.btn-outline:hover{background:#e8f0fe}
#modeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-height:260px;overflow-y:auto;padding:4px}
.mode-card{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;border:2px solid #e8eaed;border-radius:10px;padding:10px 6px;cursor:pointer;transition:border-color 0.2s,background 0.2s;min-height:70px}
.mode-card:hover{border-color:#4285f4;background:#e8f0fe}
.mode-card.selected{border-color:#4285f4;background:#e8f0fe}
.mode-icon{font-size:22px;margin-bottom:4px}
.mode-name{font-size:10px;font-weight:bold;color:#333;text-align:center;line-height:1.2}
#settingsPanel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center}
#settingsPanel.open{display:flex}
#settingsBox{background:#fff;border-radius:16px;width:90%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
#settingsTabs{display:flex;border-bottom:2px solid #e8eaed}
.stab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:bold;color:#5f6368;border:none;background:none;font-size:14px;transition:color 0.2s}
.stab.active{color:#4285f4;border-bottom:3px solid #4285f4;margin-bottom:-2px}
#settingsContent{overflow-y:auto;padding:16px;flex:1}
.setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.setting-label{font-size:14px;font-weight:bold;color:#333}
.setting-desc{font-size:12px;color:#5f6368;margin-top:2px}
.radio-group{display:flex;gap:6px}
.radio-btn{padding:6px 12px;border:2px solid #e8eaed;border-radius:20px;cursor:pointer;font-size:12px;font-weight:bold;color:#5f6368;transition:all 0.2s;white-space:nowrap}
.radio-btn.active{border-color:#4285f4;color:#4285f4;background:#e8f0fe}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:0.3s}
.toggle-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s}
.toggle input:checked+.toggle-slider{background:#4285f4}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.color-palette{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.color-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color 0.2s,transform 0.2s}
.color-dot:hover,.color-dot.selected{border-color:#4285f4;transform:scale(1.1)}
.rainbow-dot{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);border-radius:50%;width:30px;height:30px;cursor:pointer;border:3px solid transparent;transition:border-color 0.2s}
.rainbow-dot:hover,.rainbow-dot.selected{border-color:#4285f4}
.bg-swatch{width:50px;height:34px;border-radius:6px;cursor:pointer;border:3px solid transparent;display:inline-flex;overflow:hidden;transition:border-color 0.2s}
.bg-swatch:hover,.bg-swatch.selected{border-color:#4285f4}
.bg-half{width:50%;height:100%}
.food-opt{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px;border-radius:8px;border:2px solid transparent;transition:border-color 0.2s;font-size:10px;color:#333}
.food-opt:hover,.food-opt.selected{border-color:#4285f4;background:#e8f0fe}
.food-icon-preview{font-size:22px;margin-bottom:2px}
#dailyInfo{background:#e8f0fe;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px;color:#1a73e8;text-align:center}
#pauseOverlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(248,249,250,0.85);z-index:9;display:none;align-items:center;justify-content:center;border-radius:12px}
#pauseOverlay.visible{display:flex}
#pauseOverlay h2{font-size:32px;color:#333;font-weight:bold}
.settings-close{background:none;border:none;font-size:24px;cursor:pointer;padding:8px;color:#5f6368;float:right}
#settingsHeader{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #e8eaed}
#settingsHeader h2{font-size:18px;font-weight:bold;color:#333}
input[type=color]{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0;overflow:hidden}
input[type=color].selected{border-color:#4285f4}
.emoji-input{width:44px;height:44px;font-size:24px;text-align:center;border:2px solid #e8eaed;border-radius:8px;cursor:text}
.section-title{font-size:13px;font-weight:bold;color:#5f6368;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
#startModeLabel{font-size:12px;color:#5f6368;margin-bottom:6px;text-align:center}
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="topBar">
    <div id="scoreDisplay">Score: <span id="scoreVal">0</span><span id="highScoreDisplay">Recorde: <span id="hsVal">0</span></span></div>
    <div id="topRight">
      <span id="botBadge">🤖 BOT ATIVO</span>
      <button id="pauseBtn" title="Pause (P)">⏸</button>
      <button id="muteBtn" title="Sound (M)">🔊</button>
      <button id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>
  <div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="overlayScreen">
      <div id="startScreen">
        <div class="overlay-title">🐍 Snake</div>
        <div class="overlay-sub" id="dailyDateLabel"></div>
        <div id="startModeLabel">Selecione o modo:</div>
        <div id="modeGrid"></div>
        <div style="margin-top:12px;display:flex;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-green" id="playBtn">▶ Play</button>
        </div>
      </div>
      <div id="gameOverScreen" style="display:none;text-align:center">
        <div class="overlay-title" id="goTitle">Game Over</div>
        <div class="score-big" id="goScore">0</div>
        <div class="record-text" id="goHigh"></div>
        <div class="new-record" id="goNewRecord"></div>
        <div id="dailyBlockedMsg" style="display:none;color:#e53935;font-size:13px;margin-bottom:8px"></div>
        <button class="btn" id="replayBtn">↺ Jogar Novamente</button>
        <button class="btn btn-outline" id="goMenuBtn">☰ Menu</button>
      </div>
    </div>
    <div id="pauseOverlay"><h2>⏸ Pausado</h2></div>
  </div>
</div>

<div id="settingsPanel">
  <div id="settingsBox">
    <div id="settingsHeader">
      <h2>⚙️ Configurações</h2>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>
    <div id="settingsTabs">
      <button class="stab active" data-tab="general">Geral</button>
      <button class="stab" data-tab="mode">Modo</button>
      <button class="stab" data-tab="custom">Custom</button>
    </div>
    <div id="settingsContent">
      <div id="tab-general">
        <div class="setting-row">
          <div><div class="setting-label">Velocidade</div></div>
          <div class="radio-group">
            <div class="radio-btn" data-speed="turtle">🐢</div>
            <div class="radio-btn" data-speed="snake">🐍</div>
            <div class="radio-btn" data-speed="rabbit">🐇</div>
          </div>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">Tamanho do mapa</div></div>
          <div class="radio-group">
            <div class="radio-btn" data-size="small">Pequeno</div>
            <div class="radio-btn" data-size="normal">Normal</div>
            <div class="radio-btn" data-size="large">Grande</div>
          </div>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">Som</div><div class="setting-desc">Efeitos sonoros</div></div>
          <label class="toggle"><input type="checkbox" id="soundToggle"><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-row">
          <div><div class="setting-label">Bot Autoplay</div><div class="setting-desc">A cobra joga sozinha</div></div>
          <label class="toggle"><input type="checkbox" id="botToggle"><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div id="tab-mode" style="display:none">
        <div class="section-title">Modo de Jogo</div>
        <div id="settingsModeGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"></div>
      </div>
      <div id="tab-custom" style="display:none">
        <div class="section-title">Cor da Cobra</div>
        <div class="color-palette" id="snakeColorPalette"></div>
        <div style="margin-top:16px" class="section-title">Plano de Fundo</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px" id="bgPalette"></div>
        <div style="margin-top:16px" class="section-title">Tipo de Comida</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px" id="foodPalette"></div>
        <div style="margin-top:12px">
          <div class="section-title">Emoji Personalizado</div>
          <input class="emoji-input" id="customFoodEmoji" maxlength="2" placeholder="🍎">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
const MODES=[
  {id:'classic',name:'Clássico',icon:'🐍'},
  {id:'wall',name:'Wall Mode',icon:'🧱'},
  {id:'portal',name:'Portal Mode',icon:'🌀'},
  {id:'yinyang',name:'Yin Yang',icon:'☯️'},
  {id:'poison',name:'Poison Mode',icon:'☠️'},
  {id:'key',name:'Key Mode',icon:'🔑'},
  {id:'minesweeper',name:'Minesweeper',icon:'💣'},
  {id:'light',name:'Light Mode',icon:'🔦'},
  {id:'statue',name:'Statue Mode',icon:'🗿'},
  {id:'sokoban',name:'Sokoban',icon:'📦'},
  {id:'blender',name:'Blender',icon:'🎲'},
  {id:'daily',name:'Daily Challenge',icon:'📅'}
];
const GRID_SIZES={small:{w:10,h:9},normal:{w:17,h:15},large:{w:24,h:21}};
const SPEEDS={turtle:220,snake:120,rabbit:55};
const BG_THEMES={
  classic:{c1:'#aad751',c2:'#a2d149',name:'Clássico'},
  dark:{c1:'#2d2d2d',c2:'#1a1a1a',name:'Escuro'},
  forest:{c1:'#5a8a3c',c2:'#4d7a30',name:'Floresta'},
  ocean:{c1:'#4da6c8',c2:'#3d96b8',name:'Oceano'},
  desert:{c1:'#d4a843',c2:'#c49833',name:'Deserto'},
  neon:{c1:'#0a0a1a',c2:'#050510',name:'Neon'}
};
const SNAKE_COLORS=[
  {name:'Verde',val:'#4a7c59'},{name:'Azul',val:'#1a73e8'},{name:'Roxo',val:'#7c4dff'},
  {name:'Laranja',val:'#f57c00'},{name:'Rosa',val:'#e91e8c'},{name:'Vermelho',val:'#d32f2f'},
  {name:'Amarelo',val:'#fdd835'},{name:'Branco',val:'#f5f5f5'},{name:'Preto',val:'#212121'},
  {name:'Arco-íris',val:'rainbow'}
];
const FOOD_TYPES=[
  {id:'apple',name:'Maçã',icon:'🍎'},{id:'banana',name:'Banana',icon:'🍌'},
  {id:'grape',name:'Uva',icon:'🍇'},{id:'carrot',name:'Cenoura',icon:'🥕'},
  {id:'star',name:'Estrela',icon:'⭐'},{id:'diamond',name:'Diamante',icon:'💎'}
];

let cfg={speed:'snake',size:'normal',sound:true,bot:false,mode:'classic',
  snakeColor:'#4a7c59',bgTheme:'classic',customBg1:'#aad751',customBg2:'#a2d149',
  foodType:'apple',customFoodEmoji:'🍎',customSnakeColor:'#4a7c59'};

function loadCfg(){
  try{const s=localStorage.getItem('snakeCfg');if(s)Object.assign(cfg,JSON.parse(s));}catch(e){}
}
function saveCfg(){
  try{localStorage.setItem('snakeCfg',JSON.stringify(cfg));}catch(e){}
}
loadCfg();

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreVal=document.getElementById('scoreVal');
const overlayScreen=document.getElementById('overlayScreen');
const startScreen=document.getElementById('startScreen');
const gameOverScreen=document.getElementById('gameOverScreen');
const botBadge=document.getElementById('botBadge');
const pauseOverlay=document.getElementById('pauseOverlay');
const muteBtn=document.getElementById('muteBtn');

let COLS,ROWS,CELL,canvasW,canvasH;
let snake,dir,nextDir,food,score,gameState,animId,lastTime,elapsed;
let walls=[],mines=[],shadowSnake=[],lockBlocks=[],keyOnBoard=false,keyPos=null;
let poisonFood=null,poisonActive=false,poisonTimer=0;
let sokobanBoxes=[],sokobanTargets=[];
let lightMode=false;
let statueBlocks=[];
let portaling=false;
let blenderModes=[];
let effectiveMode='classic';
let botActive=false;
let rainbowHue=0;
let currentFood2=null;
let mineWarnings={};
let dailySeed=0;
let dailyRng=null;

function getDailyKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function mulberry32(seed){
  return function(){
    seed|=0;seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function dateToSeed(dateStr){
  let h=0;
  for(let i=0;i<dateStr.length;i++){h=Math.imul(31,h)+dateStr.charCodeAt(i)|0;}
  return h>>>0;
}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function playSound(type){
  if(!cfg.sound)return;
  try{
    const g=audioCtx.createGain();
    g.connect(audioCtx.destination);
    if(type==='eat'){
      const o=audioCtx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(523,audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(659,audioCtx.currentTime+0.1);
      g.gain.setValueAtTime(0.3,audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.2);
      o.connect(g);o.start();o.stop(audioCtx.currentTime+0.2);
    }else if(type==='die'){
      const o=audioCtx.createOscillator();o.type='sawtooth';
      o.frequency.setValueAtTime(400,audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(100,audioCtx.currentTime+0.4);
      g.gain.setValueAtTime(0.3,audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.4);
      o.connect(g);o.start();o.stop(audioCtx.currentTime+0.4);
    }else if(type==='start'){
      const o=audioCtx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(330,audioCtx.currentTime);
      o.frequency.linearRampToValueAtTime(524,audioCtx.currentTime+0.15);
      g.gain.setValueAtTime(0.2,audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.15);
      o.connect(g);o.start();o.stop(audioCtx.currentTime+0.15);
    }
  }catch(e){}
}

function getHighScoreKey(){
  const m=cfg.mode==='daily'?'daily_'+getDailyKey():cfg.mode;
  return 'highScore_'+m;
}
function getHighScore(){
  return parseInt(localStorage.getItem(getHighScoreKey())||'0');
}
function setHighScore(s){
  const cur=getHighScore();
  if(s>cur)localStorage.setItem(getHighScoreKey(),s);
}
function getDailyScore(){
  return parseInt(localStorage.getItem('dailyScore_'+getDailyKey())||'-1');
}
function setDailyScore(s){
  localStorage.setItem('dailyScore_'+getDailyKey(),s);
}

function setupCanvas(){
  const g=GRID_SIZES[cfg.size];
  COLS=g.w;ROWS=g.h;
  const maxW=Math.min(window.innerWidth-20,600);
  CELL=Math.floor(maxW/COLS);
  canvasW=CELL*COLS;canvasH=CELL*ROWS;
  canvas.width=canvasW;canvas.height=canvasH;
  document.getElementById('canvasContainer').style.width=canvasW+'px';
}

function rndInt(a,b,rng){
  const r=rng?rng():Math.random();
  return Math.floor(r*(b-a+1))+a;
}
function rndCell(rng){
  return{x:rndInt(0,COLS-1,rng),y:rndInt(0,ROWS-1,rng)};
}
function cellFree(p,excludeSnake){
  if(p.x<0||p.x>=COLS||p.y<0||p.y>=ROWS)return false;
  const sn=excludeSnake||snake;
  if(sn.some(s=>s.x===p.x&&s.y===p.y))return false;
  if(walls.some(w=>w.x===p.x&&w.y===p.y))return false;
  if(statueBlocks.some(b=>b.x===p.x&&b.y===p.y))return false;
  if(lockBlocks.some(b=>b.x===p.x&&b.y===p.y))return false;
  return true;
}
function spawnFood(rng){
  let attempts=0;
  let p;
  do{
    p=rndCell(rng);
    attempts++;
    if(attempts>500)break;
  }while(!cellFree(p)||isMineAt(p)||(food&&food.x===p.x&&food.y===p.y)||(sokobanBoxes.some(b=>b.x===p.x&&b.y===p.y)));
  return p;
}
function isMineAt(p){
  return mines.some(m=>m.x===p.x&&m.y===p.y);
}

function getEffectiveMode(){
  if(cfg.mode==='blender'){
    const nonBlender=MODES.filter(m=>m.id!=='blender'&&m.id!=='daily'&&m.id!=='sokoban'&&m.id!=='yinyang');
    const a=nonBlender[Math.floor(Math.random()*nonBlender.length)];
    let b;do{b=nonBlender[Math.floor(Math.random()*nonBlender.length)];}while(b.id===a.id);
    blenderModes=[a.id,b.id];
    return a.id;
  }
  blenderModes=[];
  return cfg.mode;
}

function initGame(){
  setupCanvas();
  effectiveMode=getEffectiveMode();
  walls=[];mines=[];shadowSnake=[];lockBlocks=[];
  keyOnBoard=false;keyPos=null;poisonFood=null;
  poisonActive=false;poisonTimer=0;sokobanBoxes=[];sokobanTargets=[];
  statueBlocks=[];mineWarnings={};portaling=false;
  const rng=cfg.mode==='daily'?mulberry32(dailySeed):null;
  const midX=Math.floor(COLS/2),midY=Math.floor(ROWS/2);
  snake=[{x:midX,y:midY},{x:midX-1,y:midY},{x:midX-2,y:midY}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;scoreVal.textContent='0';
  document.getElementById('hsVal').textContent=getHighScore();
  food=spawnFood(rng);
  if(effectiveMode==='yinyang'){
    shadowSnake=[{x:COLS-midX-1,y:ROWS-midY-1},{x:COLS-midX,y:ROWS-midY-1},{x:COLS-midX+1,y:ROWS-midY-1}];
  }
  if(effectiveMode==='key'){
    spawnLockBlocks();
    spawnKey();
  }
  if(effectiveMode==='sokoban'){
    initSokoban(rng);
  }
  if(effectiveMode==='poison'){
    spawnPoisonFood(rng);
  }
  botActive=cfg.bot;
  rainbowHue=0;
  gameState='playing';
  if(cfg.mode==='blender'&&blenderModes.length>0){
    const blenderNames=blenderModes.map(id=>MODES.find(m=>m.id===id)?.icon||'').join('+');
    scoreVal.parentElement.querySelector('#blenderTag')&&scoreVal.parentElement.querySelector('#blenderTag').remove();
    const bt=document.createElement('span');bt.id='blenderTag';bt.style.cssText='font-size:11px;color:#9c27b0;font-weight:normal';
    bt.textContent='🎲 '+blenderNames;scoreVal.parentElement.appendChild(bt);
  }else{
    const bt=document.getElementById('blenderTag');if(bt)bt.remove();
  }
  lastTime=null;elapsed=0;
  botBadge.style.display=botActive?'inline-block':'none';
  pauseOverlay.classList.remove('visible');
  overlayScreen.classList.add('hidden');
  playSound('start');
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function spawnLockBlocks(){
  const count=3;
  for(let i=0;i<count;i++){
    let p;
    do{p=rndCell();}while(!cellFree(p)||lockBlocks.some(b=>b.x===p.x&&b.y===p.y));
    lockBlocks.push({x:p.x,y:p.y,hidden:true});
  }
}
function spawnKey(){
  let p;
  do{p=rndCell();}while(!cellFree(p)||lockBlocks.some(b=>b.x===p.x&&b.y===p.y));
  keyPos=p;keyOnBoard=true;
}
function spawnPoisonFood(rng){
  let p;
  let attempts=0;
  do{p=rndCell(rng);attempts++;}while((!cellFree(p)||(food&&p.x===food.x&&p.y===food.y))&&attempts<200);
  poisonFood=p;
}
function initSokoban(rng){
  const count=2;
  for(let i=0;i<count;i++){
    let bp,tp;
    do{bp=rndCell(rng);}while(!cellFree(bp)||sokobanBoxes.some(b=>b.x===bp.x&&b.y===bp.y));
    do{tp=rndCell(rng);}while(!cellFree(tp)||sokobanTargets.some(t=>t.x===tp.x&&t.y===tp.y)||sokobanBoxes.some(b=>b.x===tp.x&&b.y===tp.y)||sokobanBoxes.some(b=>b.x===bp.x&&b.y===bp.y&&tp.x===bp.x&&tp.y===bp.y));
    sokobanBoxes.push({x:bp.x,y:bp.y});
    sokobanTargets.push({x:tp.x,y:tp.y});
  }
}

function getSnakeColor(index){
  if(cfg.snakeColor==='rainbow'){
    const hue=(rainbowHue+index*15)%360;
    return`hsl(${hue},80%,45%)`;
  }
  return cfg.snakeColor;
}

function getBgColors(){
  if(cfg.bgTheme==='custom')return{c1:cfg.customBg1,c2:cfg.customBg2};
  return BG_THEMES[cfg.bgTheme]||BG_THEMES.classic;
}

function drawBoard(){
  const{c1,c2}=getBgColors();
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      ctx.fillStyle=(row+col)%2===0?c1:c2;
      ctx.fillRect(col*CELL,row*CELL,CELL,CELL);
    }
  }
  if(cfg.bgTheme==='neon'){
    ctx.strokeStyle='rgba(0,255,180,0.08)';
    ctx.lineWidth=0.5;
    for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,canvasH);ctx.stroke();}
    for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(canvasW,r*CELL);ctx.stroke();}
  }
}

function drawSnakeSegment(snake,colorFn,dirRef){
  if(!snake||snake.length===0)return;
  ctx.lineCap='round';ctx.lineJoin='round';
  for(let i=snake.length-1;i>=0;i--){
    const seg=snake[i];
    const color=colorFn(i);
    const bodyR=CELL*0.4;
    if(i<snake.length-1){
      const next=snake[i+1];
      ctx.beginPath();
      ctx.moveTo(seg.x*CELL+CELL/2,seg.y*CELL+CELL/2);
      ctx.lineTo(next.x*CELL+CELL/2,next.y*CELL+CELL/2);
      ctx.strokeStyle=color;
      ctx.lineWidth=bodyR*1.85;
      ctx.stroke();
    }
    const r=i===0?CELL*0.44:bodyR;
    ctx.beginPath();
    ctx.arc(seg.x*CELL+CELL/2,seg.y*CELL+CELL/2,r,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
  }
  const head=snake[0];
  const hcolor=colorFn(0);
  const eyeOff=CELL*0.16;
  const eyeR=CELL*0.11;
  const dx=dirRef.x,dy=dirRef.y;
  const px=-dy,py=dx;
  const hcx=head.x*CELL+CELL/2+dx*eyeOff;
  const hcy=head.y*CELL+CELL/2+dy*eyeOff;
  const eyeSpread=CELL*0.15;
  [1,-1].forEach(s=>{
    const ex=hcx+px*eyeSpread*s;
    const ey=hcy+py*eyeSpread*s;
    ctx.beginPath();ctx.arc(ex,ey,eyeR,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.beginPath();ctx.arc(ex+dx*eyeR*0.45,ey+dy*eyeR*0.45,eyeR*0.52,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
  });
}
function drawSnake(){
  drawSnakeSegment(snake,getSnakeColor,dir);
}

function drawShadowSnake(){
  if(!shadowSnake.length)return;
  const shadowDir={x:-dir.x,y:-dir.y};
  drawSnakeSegment(shadowSnake,()=>'#555',shadowDir);
}

function drawFood(){
  drawFoodAt(food.x,food.y,false);
  if(poisonFood&&effectiveMode==='poison'){
    drawFoodAt(poisonFood.x,poisonFood.y,true);
  }
  if(effectiveMode==='sokoban'){
    sokobanBoxes.forEach((b,i)=>{
      const tx=b.x*CELL,ty=b.y*CELL;
      ctx.fillStyle='#a0522d';
      ctx.fillRect(tx+2,ty+2,CELL-4,CELL-4);
      ctx.strokeStyle='#7a3d1c';
      ctx.lineWidth=2;
      ctx.strokeRect(tx+2,ty+2,CELL-4,CELL-4);
      ctx.fillStyle='#c68642';
      ctx.fillRect(tx+5,ty+5,CELL-10,CELL-10);
      const t=sokobanTargets[i];
      if(t){
        ctx.strokeStyle='rgba(255,165,0,0.5)';
        ctx.lineWidth=2;
        ctx.setLineDash([3,3]);
        ctx.strokeRect(t.x*CELL+3,t.y*CELL+3,CELL-6,CELL-6);
        ctx.setLineDash([]);
      }
    });
  }
}

function drawFoodAt(fx,fy,poison){
  const cx=fx*CELL+CELL/2,cy=fy*CELL+CELL/2,r=CELL*0.36;
  if(poison){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#9e9e9e';ctx.fill();
    ctx.fillStyle='#666';
    ctx.font=`bold ${CELL*0.4}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('☠',cx,cy);
    return;
  }
  const ft=cfg.foodType;
  if(ft==='custom'){
    ctx.font=`${CELL*0.6}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(cfg.customFoodEmoji||'🍎',cx,cy+1);
    return;
  }
  const icons={apple:'🍎',banana:'🍌',grape:'🍇',carrot:'🥕',star:'⭐',diamond:'💎'};
  const icon=icons[ft]||'🍎';
  ctx.font=`${CELL*0.6}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icon,cx,cy+1);
}

function drawWalls(){
  walls.forEach(w=>{
    ctx.fillStyle='#8B4513';
    ctx.fillRect(w.x*CELL,w.y*CELL,CELL,CELL);
    ctx.fillStyle='#a0522d';
    for(let row=0;row<2;row++){
      for(let col=0;col<2;col++){
        const bx=w.x*CELL+col*(CELL/2),by=w.y*CELL+row*(CELL/2);
        ctx.strokeStyle='#7a3d1c';ctx.lineWidth=1;
        ctx.strokeRect(bx+1,by+1,CELL/2-2,CELL/2-2);
      }
    }
  });
}
function drawMines(){
  mines.forEach(m=>{
    const cx=m.x*CELL+CELL/2,cy=m.y*CELL+CELL/2;
    ctx.beginPath();ctx.arc(cx,cy,CELL*0.35,0,Math.PI*2);
    ctx.fillStyle='#333';ctx.fill();
    ctx.fillStyle='#555';
    ctx.beginPath();ctx.arc(cx-CELL*0.1,cy-CELL*0.1,CELL*0.1,0,Math.PI*2);ctx.fill();
    const warn=mineWarnings[m.x+','+m.y];
    if(warn){
      ctx.fillStyle='#f44336';
      ctx.font=`bold ${CELL*0.55}px Arial`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(Math.ceil(warn/60),cx,cy);
    }
  });
  mines.forEach(m=>{
    const rad=2;
    for(let dy=-rad;dy<=rad;dy++){
      for(let dx=-rad;dx<=rad;dx++){
        if(dx===0&&dy===0)continue;
        const nx=m.x+dx,ny=m.y+dy;
        if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<=rad){
          ctx.fillStyle=`rgba(255,60,0,${0.08})`;
          ctx.fillRect(nx*CELL,ny*CELL,CELL,CELL);
        }
      }
    }
  });
}
function drawLockBlocks(){
  lockBlocks.forEach(b=>{
    if(!b.hidden)return;
    const tx=b.x*CELL,ty=b.y*CELL;
    ctx.fillStyle='#607d8b';
    ctx.fillRect(tx+1,ty+1,CELL-2,CELL-2);
    ctx.font=`${CELL*0.55}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔒',tx+CELL/2,ty+CELL/2+1);
  });
}
function drawKey(){
  if(keyOnBoard&&keyPos){
    ctx.font=`${CELL*0.6}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔑',keyPos.x*CELL+CELL/2,keyPos.y*CELL+CELL/2+1);
  }
}
function drawStatueBlocks(){
  statueBlocks.forEach(b=>{
    ctx.fillStyle='rgba(100,100,100,0.8)';
    ctx.fillRect(b.x*CELL+1,b.y*CELL+1,CELL-2,CELL-2);
  });
}
function drawLightOverlay(){
  if(effectiveMode!=='light')return;
  const head=snake[0];
  const cx=head.x*CELL+CELL/2,cy=head.y*CELL+CELL/2;
  const radius=CELL*3.5;
  const grad=ctx.createRadialGradient(cx,cy,radius*0.3,cx,cy,radius);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0.92)');

function drawPoisonOverlay(){
  if(poisonActive){
    ctx.fillStyle='rgba(0,200,0,0.06)';

function render(){
  ctx.clearRect(0,0,canvasW,canvasH);
  drawBoard();
  drawWalls();
  drawStatueBlocks();

function getInterval(){
  return SPEEDS[cfg.speed];
}

function loop(ts){
  if(gameState!=='playing'){return;}
  if(!lastTime)lastTime=ts;
  const dt=ts-lastTime;lastTime=ts;
  elapsed+=dt;
  const interval=getInterval();
  if(elapsed>=interval){
    elapsed=0;
    if(botActive)runBot();
    update();
  }
  render();
  animId=requestAnimationFrame(loop);
}

function update(){
  if(poisonActive){
    poisonTimer--;
    if(poisonTimer<=0){poisonActive=false;nextDir=dir;}
    else{
      const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
      nextDir=dirs[Math.floor(Math.random()*4)];
    }
  }
  dir={x:nextDir.x,y:nextDir.y};
  const head=snake[0];
  const nx=head.x+dir.x,ny=head.y+dir.y;
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS){gameOver();return;}
  if(snake.some((s,i)=>i>0&&s.x===nx&&s.y===ny)){gameOver();return;}
  if(walls.some(w=>w.x===nx&&w.y===ny)){gameOver();return;}
  if(statueBlocks.some(b=>b.x===nx&&b.y===ny)){gameOver();return;}
  if(lockBlocks.some(b=>b.hidden&&b.x===nx&&b.y===ny)){gameOver();return;}

  if(effectiveMode==='sokoban'){
    const boxIdx=sokobanBoxes.findIndex(b=>b.x===nx&&b.y===ny);
    if(boxIdx>=0){
      const bx=nx+dir.x,by=ny+dir.y;
      if(bx<0||bx>=COLS||by<0||by>=ROWS||walls.some(w=>w.x===bx&&w.y===by)||sokobanBoxes.some(b=>b.x===bx&&b.y===by)){
        gameOver();return;
      }
      sokobanBoxes[boxIdx]={x:bx,y:by};
      const t=sokobanTargets[boxIdx];
      if(t&&bx===t.x&&by===t.y){
        sokobanBoxes.splice(boxIdx,1);sokobanTargets.splice(boxIdx,1);
        food={x:nx,y:ny};
      }
    }
  }

  if(effectiveMode==='minesweeper'){
    mines.forEach(m=>{
      const dist=Math.sqrt(Math.pow(nx-m.x,2)+Math.pow(ny-m.y,2));
      if(dist<=2){
        const key=m.x+','+m.y;
        if(!mineWarnings[key])mineWarnings[key]=30;
      }
    });
    for(const k in mineWarnings){
      mineWarnings[k]--;
      if(mineWarnings[k]<=0){
        const [mx,my]=k.split(',').map(Number);
        if(Math.abs(nx-mx)<=2&&Math.abs(ny-my)<=2){gameOver();return;}
        delete mineWarnings[k];
        mines=mines.filter(m=>!(m.x===mx&&m.y===my));
      }
    }
    const onMine=isMineAt({x:nx,y:ny});
    if(onMine){gameOver();return;}
  }

  const newHead={x:nx,y:ny};
  let ateFood=false;

  if(effectiveMode==='key'){
    if(keyOnBoard&&keyPos&&nx===keyPos.x&&ny===keyPos.y){
      keyOnBoard=false;keyPos=null;
      lockBlocks.forEach(b=>b.hidden=false);
      lockBlocks=[];
    }
  }

  if(food&&nx===food.x&&ny===food.y){
    ateFood=true;
    score++;scoreVal.textContent=score;
    document.getElementById('hsVal').textContent=Math.max(score,getHighScore());
    playSound('eat');
    const rng=cfg.mode==='daily'?mulberry32(dailySeed+score):null;
    food=spawnFood(rng);
    if(effectiveMode==='wall'){
      const tail=snake[snake.length-1];
      if(!walls.some(w=>w.x===tail.x&&w.y===tail.y)&&!snake.some(s=>s.x===tail.x&&s.y===tail.y)){
        walls.push({x:tail.x,y:tail.y});
      }
    }
    if(effectiveMode==='portal'||blenderModes.includes('portal')){
      let tp;
      let attempts=0;
      do{tp=rndCell();attempts++;}while((!cellFree(tp)||tp.x===food.x&&tp.y===food.y)&&attempts<100);
      snake[0]={x:tp.x,y:tp.y};
    }
    if(effectiveMode==='minesweeper'){
      let mp;
      do{mp=rndCell();}while(!cellFree(mp)||isMineAt(mp));
      mines.push({x:mp.x,y:mp.y});
    }
    if(effectiveMode==='light'){
    }
    if(effectiveMode==='key'&&lockBlocks.length===0&&!keyOnBoard){
      spawnLockBlocks();spawnKey();
    }
  }

  if(poisonFood&&effectiveMode==='poison'&&nx===poisonFood.x&&ny===poisonFood.y){
    poisonActive=true;poisonTimer=50;
    poisonFood=null;
    setTimeout(()=>{spawnPoisonFood();},2000);
  }

  if(effectiveMode==='statue'&&snake.length>1){
    const oldTail=snake[snake.length-1];
    if(!ateFood){statueBlocks.push({x:oldTail.x,y:oldTail.y});}
  }

  snake.unshift(newHead);
  if(!ateFood)snake.pop();

  if(effectiveMode==='yinyang'&&shadowSnake.length>0){
    const sh=shadowSnake[0];
    const sdx=-(dir.x),sdy=-(dir.y);
    const snx=sh.x+sdx,sny=sh.y+sdy;
    if(snx<0||snx>=COLS||sny<0||sny>=ROWS){gameOver();return;}
    if(snake.some(s=>s.x===snx&&s.y===sny)){gameOver();return;}
    if(shadowSnake.some((s,i)=>i>0&&s.x===snx&&s.y===sny)){gameOver();return;}
    shadowSnake.unshift({x:snx,y:sny});
    if(!ateFood)shadowSnake.pop();
  }

  if(cfg.snakeColor==='rainbow')rainbowHue=(rainbowHue+3)%360;
}

    pauseOverlay.classList.add('visible');

  }else if(gameState==='paused'){

document.addEventListener('keydown',function(e){
  if(gameState==='playing'||gameState==='paused'){
    const keyMap={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
      w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
      W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
    const nd=keyMap[e.key];
    if(nd){
      e.preventDefault();
      if(nd.x!==-dir.x||nd.y!==-dir.y){
        nextDir=nd;
        if(botActive){botActive=false;botBadge.style.display='none';}
      }
    }
    if(e.key==='p'||e.key==='P')togglePause();

  }
});

let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',function(e){
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',function(e){
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){
    const nd=dx>0?{x:1,y:0}:{x:-1,y:0};

  }else{
    const nd=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(nd.y!==-dir.y){nextDir=nd;if(botActive){botActive=false;botBadge.style.display='none';}}
  }
  e.preventDefault();
},{passive:false});

function bfsPath(start,goal,snakeBody){
  const visited=new Set();
  const queue=[{pos:start,path:[]}];
  visited.add(start.x+','+start.y);
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  while(queue.length>0){
    const{pos,path}=queue.shift();
    for(const d of dirs){
      const nx=pos.x+d.x,ny=pos.y+d.y;
      const key=nx+','+ny;
      if(visited.has(key))continue;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
      if(snakeBody.some((s,i)=>i>0&&s.x===nx&&s.y===ny))continue;
      if(walls.some(w=>w.x===nx&&w.y===ny))continue;
      if(statueBlocks.some(b=>b.x===nx&&b.y===ny))continue;
      if(lockBlocks.some(b=>b.hidden&&b.x===nx&&b.y===ny))continue;
      visited.add(key);
      const newPath=[...path,d];
      if(nx===goal.x&&ny===goal.y)return newPath;
      queue.push({pos:{x:nx,y:ny},path:newPath});
    }
  }
  return null;
}

function runBot(){
  if(!food)return;
  const head=snake[0];
  const target=keyOnBoard&&keyPos?keyPos:food;
  let path=bfsPath(head,target,snake);
  if(path&&path.length>0){
    const nd=path[0];
    if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;
  }else{
    const tail=snake[snake.length-1];
    const fallback=bfsPath(head,tail,snake);
    if(fallback&&fallback.length>0){
      const nd=fallback[0];
      if(nd.x!==-dir.x||nd.y!==-dir.y)nextDir=nd;
    }else{
      const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
      for(const d of dirs){
        const nx=head.x+d.x,ny=head.y+d.y;
        if(nx<0||nx>=COLS||ny<0||ny>=ROWS)continue;
        if(snake.some((s,i)=>i>0&&s.x===nx&&s.y===ny))continue;
        if(walls.some(w=>w.x===nx&&w.y===ny))continue;
        if(d.x!==-dir.x||d.y!==-dir.y){nextDir=d;break;}
      }
    }
  }
}

function buildModeGrid(containerId){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  MODES.forEach(m=>{
    const card=document.createElement('div');
    card.className='mode-card'+(cfg.mode===m.id?' selected':'');
    card.innerHTML=`<span class="mode-icon">${m.icon}</span><span class="mode-name">${m.name}</span>`;
    card.onclick=function(){
      cfg.mode=m.id;saveCfg();
      el.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      if(containerId==='modeGrid')updateDailyLabel();
      if(containerId==='settingsModeGrid'){
        buildModeGrid('modeGrid');
      }
    };
    el.appendChild(card);
  });
}

function buildColorPalette(){
  const el=document.getElementById('snakeColorPalette');
  el.innerHTML='';
  SNAKE_COLORS.forEach(c=>{
    if(c.val==='rainbow'){
      const d=document.createElement('div');
      d.className='rainbow-dot'+(cfg.snakeColor==='rainbow'?' selected':'');
      d.title='Arco-íris';
      d.onclick=function(){
        cfg.snakeColor='rainbow';saveCfg();
        el.querySelectorAll('.color-dot,.rainbow-dot').forEach(x=>x.classList.remove('selected'));
        d.classList.add('selected');
      };
      el.appendChild(d);
    }else{
      const d=document.createElement('div');
      d.className='color-dot'+(cfg.snakeColor===c.val?' selected':'');
      d.style.background=c.val;d.title=c.name;
      d.onclick=function(){
        cfg.snakeColor=c.val;saveCfg();
        el.querySelectorAll('.color-dot,.rainbow-dot').forEach(x=>x.classList.remove('selected'));
        d.classList.add('selected');
        customColorInput.classList.remove('selected');
      };
      el.appendChild(d);
    }
  });
  const customColorInput=document.createElement('input');
  customColorInput.type='color';
  customColorInput.value=cfg.customSnakeColor||'#ff5722';
  customColorInput.className=(cfg.snakeColor===cfg.customSnakeColor&&cfg.snakeColor!=='rainbow'&&!SNAKE_COLORS.some(c=>c.val===cfg.snakeColor))?'selected':'';
  customColorInput.title='Cor personalizada';
  customColorInput.oninput=function(){
    cfg.customSnakeColor=this.value;cfg.snakeColor=this.value;saveCfg();
    el.querySelectorAll('.color-dot,.rainbow-dot').forEach(x=>x.classList.remove('selected'));
    customColorInput.classList.add('selected');
  };
  el.appendChild(customColorInput);
}
buildColorPalette();

function applySettings(){

  });
  document.getElementById('soundToggle').checked=cfg.sound;
  document.getElementById('botToggle').checked=cfg.bot;
  muteBtn.textContent=cfg.sound?'🔊':'🔇';
}

});
